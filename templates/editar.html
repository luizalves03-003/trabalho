<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Editar Livro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="container mt-5">

<h1>Editar Livro</h1>

<form
    action="{{ url_for('atualizar_livros', id=livro.id) }}"
    method="POST">

    <div class="mb-3">

        <label class="form-label">

            Nome

        </label>

        <input
            type="text"
            class="form-control"
            name="nome"
            value="{{ livro.nome }}"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">

            Gênero

        </label>

        <input
            type="text"
            class="form-control"
            name="genero"
            value="{{ livro.genero }}"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">

            Ano

        </label>

        <input
            type="number"
            class="form-control"
            name="ano"
            value="{{ livro.ano }}"
            required>

    </div>

    <button
        class="btn btn-success">

        Salvar

    </button>

    <a
        href="{{ url_for('pagina_inicial') }}"
        class="btn btn-secondary">

        Cancelar

    </a>

</form>

</body>
</html>
